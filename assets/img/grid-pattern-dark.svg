<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <!-- white grid lines on right and bottom edge -->
  <line x1="128" y1="0" x2="128" y2="128" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <line x1="0"   y1="128" x2="128" y2="128" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <!-- white cross at bottom-right intersection -->
  <line x1="122.33" y1="128" x2="133.67" y2="128" stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
  <line x1="128" y1="122.33" x2="128" y2="133.67" stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
</svg>
